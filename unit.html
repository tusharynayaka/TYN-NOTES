<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unit – Mechanical Statics Notes</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="unit-page">

  <!-- ─── TOP NAV ─── -->
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <a href="index.html" class="back-btn" title="Home">←</a>
        <span class="brand-icon">⚙</span>
        <div>
          <span class="brand-title" id="unitPageTitle">Loading…</span>
          <span class="brand-sub" id="unitPageSub">Mechanical Statics</span>
        </div>
      </div>
      <div class="topbar-actions">
        <div class="search-wrap">
          <input
            id="unitSearch"
            type="search"
            placeholder="Search this unit…"
            autocomplete="off"
            spellcheck="false"
          />
          <span class="search-icon">⌕</span>
        </div>
        <button id="themeToggle" class="icon-btn" title="Toggle theme" aria-label="Toggle theme">
          <span class="theme-icon">◑</span>
        </button>
      </div>
    </div>
    <!-- reading progress bar -->
    <div id="progressBar" class="progress-bar"></div>
  </header>

  <div class="unit-layout">

    <!-- ─── SIDEBAR ─── -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <span>Questions</span>
        <button id="sidebarToggle" class="icon-btn sidebar-toggle" title="Collapse sidebar">‹</button>
      </div>
      <nav id="sidebarNav" class="sidebar-nav">
        <!-- links injected by JS -->
      </nav>
      <div class="sidebar-footer">
        <a id="prevUnitBtn" href="#" class="unit-nav-btn">← Prev Unit</a>
        <a id="nextUnitBtn" href="#" class="unit-nav-btn">Next Unit →</a>
      </div>
    </aside>

    <!-- ─── MAIN CONTENT ─── -->
    <main id="questionList" class="question-list">
      <!-- question cards injected by JS -->
    </main>

  </div>

  <!-- ─── BACK TO TOP ─── -->
  <button id="backToTop" class="back-to-top hidden" title="Back to top" aria-label="Back to top">↑</button>

  <script src="js/app.js"></script>
  <script>
    initUnit();
  </script>
</body>
</html>
