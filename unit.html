<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unit – Mechanical Statics Notes</title>
  <link rel="stylesheet" href="css/style.css" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-9DYC404SP0"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-9DYC404SP0');
  </script>
</head>

<body class="unit-page">

  <!-- ─── TOP NAV ─── -->
  <header class="topbar">
    <div class="topbar-inner">

      <div class="brand">
        <!-- Back to home -->
        <a href="index.html" class="back-btn" title="Home">←</a>
        <!-- Mobile: hamburger to open sidebar -->
        <button id="mobileSidebarToggle" class="icon-btn mobile-sidebar-btn" title="All Questions"
          aria-label="Toggle question list">☰</button>
        <span class="brand-icon">⚙</span>
        <div>
          <span class="brand-title" id="unitPageTitle">Loading…</span>
          <span class="brand-sub" id="unitPageSub">Mechanical Statics</span>
        </div>
      </div>

      <div class="topbar-actions">
        <button id="themeToggle" class="icon-btn" title="Toggle theme" aria-label="Toggle theme">
          <span class="theme-icon">◑</span>
        </button>
      </div>

    </div>
    <div id="progressBar" class="progress-bar"></div>
  </header>

  <!-- Mobile sidebar overlay -->
  <div id="sidebarOverlay" class="sidebar-overlay"></div>

  <!-- ─── MAIN LAYOUT WITH GRID ON SIDE ─── -->
  <div class="unit-layout">

    <!-- Grid Navigator on the left -->
    <aside class="q-grid-sidebar" id="qGridSidebar">
      <div class="q-grid-header">
        <span>Questions</span>
        <button id="gridToggle" class="icon-btn grid-toggle" title="Toggle grid">‹</button>
      </div>
      <div id="questionGrid" class="q-grid-container">
        <!-- populated by JS -->
      </div>
      <div class="q-grid-footer">
        <!-- Review counter at bottom -->
        <button id="reviewBadge" class="review-badge-bottom" title="View reviewed questions">
          <span class="review-icon">📋</span>
          <span class="review-count" id="reviewCountDisplay">0</span>
          <span class="review-label">for review</span>
        </button>
        <a id="prevUnitBtn" href="#" class="unit-nav-btn">← Prev</a>
        <a id="nextUnitBtn" href="#" class="unit-nav-btn">Next →</a>
      </div>
    </aside>

    <!-- Main Content -->
    <main id="questionList" class="question-list">
      <!-- question cards injected by JS -->
    </main>

  </div>

  <!-- ─── BACK TO TOP ─── -->
  <button id="backToTop" class="back-to-top hidden" title="Back to top" aria-label="Back to top">↑</button>

  <script src="js/app.js"></script>
  <script>
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initUnit);
    } else {
      initUnit();
    }
  </script>
</body>

</html>
